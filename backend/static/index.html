<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KWAC OS</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.nav-item { display:flex; align-items:center; gap:12px; padding:10px 16px; border-radius:8px; color:#bfdbfe; cursor:pointer; transition:background .15s; }
.nav-item:hover, .nav-item.active { background:#1d4ed8; color:#fff; }
.card { background:#fff; border-radius:12px; border:1px solid #f1f5f9; padding:24px; }
.stat-card { background:#fff; border-radius:12px; border:1px solid #f1f5f9; padding:20px; }
.btn { padding:8px 16px; border-radius:8px; font-weight:500; cursor:pointer; border:none; transition:background .15s; }
.btn-primary { background:#2563eb; color:#fff; }
.btn-primary:hover { background:#1d4ed8; }
.inp { width:100%; border:1px solid #e2e8f0; border-radius:8px; padding:8px 12px; font-size:14px; outline:none; box-sizing:border-box; }
.inp:focus { box-shadow:0 0 0 2px #3b82f6; }
.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:12px; font-weight:500; }
</style>
</head>
<body style="background:#f8fafc;margin:0">
<div id="app"></div>
<script>
const API = '';
let S = { user:null, page:'login', loading:false, weeklyData:null, goals:[], leaderboard:[], error:null, success:null, lastXP:0 };

async function req(method, path, body) {
  const r = await fetch(API+path, { method, credentials:'include', headers:{'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : undefined });
  if (!r.ok) { const e = await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail||'Error'); }
  return r.status===204 ? null : r.json();
}

async function checkAuth() { try { S.user = await req('GET','/auth/me'); return true; } catch { return false; } }
async function logout() { await req('POST','/auth/logout').catch(()=>{}); S.user=null; nav('login'); }

async function loadDash() {
  const [w,g,me] = await Promise.all([
    req('GET','/agents/weekly/current').catch(()=>null),
    req('GET','/agents/goals').catch(()=>[]),
    req('GET','/agents/me').catch(()=>null)
  ]);
  S.weeklyData=w; S.goals=g;
  if(me) S.user={...S.user,...me};
}

async function nav(page) {
  S.page=page; S.error=null; S.success=null;
  if(page==='dashboard') await loadDash();
  if(page==='leaderboard') S.leaderboard = await req('GET','/agents/leaderboard').catch(()=>[]);
  render();
}

function render() {
  document.getElementById('app').innerHTML = S.user ? shell() : login();
  bind();
}

function login() {
  return `<div style="min-height:100vh;background:linear-gradient(135deg,#1e3a8a,#1e40af);display:flex;align-items:center;justify-content:center;padding:16px">
  <div style="background:#fff;border-radius:20px;box-shadow:0 25px 50px rgba(0,0,0,.25);width:100%;max-width:360px;padding:40px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:28px;font-weight:900;color:#1e3a8a;letter-spacing:-1px">KWAC OS</div>
      <div style="font-size:13px;color:#94a3b8;margin-top:4px">Real Estate CRM</div>
    </div>
    ${S.error?`<div style="background:#fef2f2;color:#dc2626;font-size:13px;border-radius:8px;padding:12px;margin-bottom:16px">${S.error}</div>`:''}
    <form id="lf">
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px">EMAIL</label>
        <input class="inp" type="email" id="le" placeholder="email@example.com" required>
      </div>
      <div style="margin-bottom:24px">
        <label style="display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px">ΚΩΔΙΚΟΣ</label>
        <input class="inp" type="password" id="lp" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:15px">
        ${S.loading?'Σύνδεση...':'Σύνδεση →'}
      </button>
    </form>
  </div>
</div>`;
}

function shell() {
  return `<div style="display:flex">
  <aside style="background:#1e3a8a;color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;width:220px;z-index:10">
    <div style="padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.1)">
      <div style="font-size:20px;font-weight:900;letter-spacing:-0.5px">KWAC OS</div>
      <div style="font-size:12px;color:#93c5fd;margin-top:4px">${S.user.full_name||S.user.email}</div>
      <div style="font-size:11px;color:#60a5fa;margin-top:2px;text-transform:capitalize">${S.user.role}</div>
    </div>
    <nav style="flex:1;padding:12px">
      <div class="nav-item ${S.page==='dashboard'?'active':''}" data-nav="dashboard">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </div>
      <div class="nav-item ${S.page==='weekly'?'active':''}" data-nav="weekly">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Εβδομαδιαία
      </div>
      <div class="nav-item ${S.page==='leaderboard'?'active':''}" data-nav="leaderboard">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Κατάταξη
      </div>
    </nav>
    <div style="padding:12px">
      <div class="nav-item" id="logoutBtn" style="color:#fca5a5;cursor:pointer">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Αποσύνδεση
      </div>
    </div>
  </aside>
  <main style="margin-left:220px;flex:1;padding:32px;min-height:100vh">
    ${page()}
  </main>
</div>`;
}

function page() {
  if(S.page==='dashboard') return dash();
  if(S.page==='weekly') return weekly();
  if(S.page==='leaderboard') return lb();
  return dash();
}

function dash() {
  const w=S.weeklyData, xp=w?.xp_earned||0, submitted=!!w?.submitted_at;
  const today=new Date(), mon=new Date(today); mon.setDate(today.getDate()-today.getDay()+1);
  const weekStr=mon.toLocaleDateString('el-GR',{day:'numeric',month:'long'});
  const gcards=S.goals.slice(0,6).map(g=>{
    const val=w?.[g.metric]||0, pct=Math.min(100,Math.round(val/(g.target||1)*100)), hit=val>=g.target;
    return `<div class="stat-card"><div style="display:flex;justify-content:space-between;align-items:start"><span style="font-size:12px;color:#64748b">${g.label_el||g.metric}</span><span class="badge" style="background:${hit?'#d1fae5':'#f1f5f9'};color:${hit?'#065f46':'#64748b'}">${val}/${g.target}</span></div><div style="margin-top:10px;background:#f1f5f9;border-radius:999px;height:6px"><div style="height:6px;border-radius:999px;width:${pct}%;background:${hit?'#10b981':'#3b82f6'}"></div></div></div>`;
  }).join('');
  return `<div style="max-width:900px;margin:0 auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px">
      <div><h1 style="font-size:24px;font-weight:700;color:#0f172a;margin:0">Γεια, ${(S.user.full_name||'').split(' ')[0]}! 👋</h1><p style="color:#64748b;font-size:14px;margin:4px 0 0">Εβδομάδα ${weekStr}</p></div>
      ${!submitted?`<button class="btn btn-primary" data-nav="weekly" style="font-size:14px">+ Καταχώρηση</button>`:`<span class="badge" style="background:#d1fae5;color:#065f46;padding:8px 16px;font-size:13px">✓ Υποβλήθηκε</span>`}
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px">
      <div class="stat-card"><div style="font-size:12px;color:#64748b">XP Εβδομάδας</div><div style="font-size:28px;font-weight:700;color:#2563eb;margin-top:4px">${xp}</div></div>
      <div class="stat-card"><div style="font-size:12px;color:#64748b">Σύνολο XP</div><div style="font-size:28px;font-weight:700;color:#0f172a;margin-top:4px">${S.user.xp_total||0}</div></div>
      <div class="stat-card"><div style="font-size:12px;color:#64748b">Level</div><div style="font-size:28px;font-weight:700;color:#f59e0b;margin-top:4px">${S.user.level||1}</div></div>
      <div class="stat-card"><div style="font-size:12px;color:#64748b">Streak</div><div style="font-size:28px;font-weight:700;color:#10b981;margin-top:4px">${S.user.streak_weeks||0} 🔥</div></div>
    </div>
    ${S.goals.length?`<div class="card"><h2 style="font-size:13px;font-weight:600;color:#475569;margin:0 0 16px;text-transform:uppercase;letter-spacing:.05em">Στόχοι εβδομάδας</h2><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">${gcards}</div></div>`:''}
  </div>`;
}

const FIELDS=[
  {cat:'Δημιουργία Leads',fields:[{k:'cold_calls',l:'Cold Calls',t:30},{k:'social_media_leads',l:'Social Media Leads',t:5},{k:'mail_leads',l:'Mail Leads',t:0},{k:'portal_leads',l:'Portal Leads',t:0},{k:'referrals',l:'Συστάσεις (εισ.)',t:2}]},
  {cat:'Follow Up',fields:[{k:'followup_calls',l:'Follow Up Calls',t:20}]},
  {cat:'Ραντεβού',fields:[{k:'first_meetings',l:'1ο Ραντεβού',t:4},{k:'second_meetings',l:'2ο Ραντεβού',t:2},{k:'meetings_with_seller',l:'Ραντεβού Πωλητή',t:0},{k:'meetings_with_buyer',l:'Ραντεβού Αγοραστή',t:0},{k:'meetings_with_tenant',l:'Ραντεβού Ενοικιαστή',t:0}]},
  {cat:'Αναθέσεις',fields:[{k:'exclusive_listings',l:'Αποκλειστική Ανάθεση',t:1},{k:'simple_listings',l:'Απλή Ανάθεση',t:2}]},
  {cat:'Συμβόλαια',fields:[{k:'sale_contracts',l:'Συμβόλαιο Πώλησης',t:1},{k:'purchase_contracts',l:'Συμβόλαιο Αγοράς',t:0},{k:'rental_contracts',l:'Συμβόλαιο Ενοικίου',t:1}]},
  {cat:'Marketing',fields:[{k:'photo_shoots',l:'Φωτογραφήσεις',t:0},{k:'open_houses',l:'Open House',t:1},{k:'matterport_scans',l:'Matterport',t:0},{k:'floor_plans',l:'Floor Plans',t:0}]},
  {cat:'Networking',fields:[{k:'new_partners',l:'Νέοι Συνεργάτες',t:0},{k:'referrals_given',l:'Συστάσεις (εξ.)',t:0}]},
  {cat:'Εκπαίδευση',fields:[{k:'trainings_attended',l:'Εκπαιδεύσεις',t:1},{k:'team_meetings',l:'Team Meetings',t:0},{k:'conferences',l:'Συνέδρια',t:0}]},
];

function weekly() {
  const w=S.weeklyData;
  const groups=FIELDS.map(g=>{
    const rows=g.fields.map(f=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f8fafc"><span style="flex:1;font-size:14px;color:#374151">${f.l}${f.t?` <span style="font-size:11px;color:#94a3b8">(στόχος: ${f.t})</span>`:''}</span><input type="number" min="0" name="${f.k}" value="${w?.[f.k]||0}" style="width:72px;border:1px solid #e2e8f0;border-radius:8px;padding:6px;text-align:center;font-size:14px;outline:none"></div>`).join('');
    return `<div class="card" style="margin-bottom:16px"><div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">${g.cat}</div>${rows}</div>`;
  }).join('');
  return `<div style="max-width:640px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
      <span style="color:#94a3b8;cursor:pointer;font-size:14px" data-nav="dashboard">← Πίσω</span>
      <h1 style="font-size:20px;font-weight:700;color:#0f172a;margin:0">Εβδομαδιαία Καταχώρηση</h1>
    </div>
    ${S.error?`<div style="background:#fef2f2;color:#dc2626;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px">${S.error}</div>`:''}
    ${S.success?`<div style="background:#f0fdf4;color:#16a34a;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px">✓ Υποβλήθηκε! +${S.lastXP} XP 🎉</div>`:''}
    <form id="wf">${groups}
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">ΣΗΜΕΙΩΣΕΙΣ</div>
        <textarea name="notes" style="width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:10px;font-size:14px;resize:vertical;height:80px;outline:none;box-sizing:border-box">${w?.notes||''}</textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:15px">${S.loading?'Υποβολή...':'✓ Υποβολή Εβδομάδας'}</button>
    </form>
  </div>`;
}

function lb() {
  const medals=['🥇','🥈','🥉'];
  const rows=S.leaderboard.map((a,i)=>`<tr style="border-bottom:1px solid #f8fafc"><td style="padding:12px 16px;color:#94a3b8;font-size:14px">${medals[i]||(i+1)}</td><td style="padding:12px 0;font-weight:500;color:#0f172a">${a.full_name}</td><td style="padding:12px 16px;text-align:right;color:#2563eb;font-weight:700">${a.xp_this_week||0}</td><td style="padding:12px 16px;text-align:right;color:#64748b">${a.xp_total||0}</td><td style="padding:12px 16px;text-align:right">${a.submitted_at?'<span class="badge" style="background:#d1fae5;color:#065f46">OK</span>':'<span class="badge" style="background:#f1f5f9;color:#94a3b8">-</span>'}</td></tr>`).join('');
  return `<div style="max-width:640px;margin:0 auto">
    <h1 style="font-size:20px;font-weight:700;color:#0f172a;margin:0 0 24px">Κατάταξη Εβδομάδας</h1>
    <div class="card" style="padding:0;overflow:hidden">
      <table style="width:100%;border-collapse:collapse">
        <thead style="background:#f8fafc;border-bottom:1px solid #e2e8f0"><tr>
          <th style="padding:12px 16px;text-align:left;font-size:11px;color:#64748b;font-weight:600">#</th>
          <th style="padding:12px 0;text-align:left;font-size:11px;color:#64748b;font-weight:600">ΠΡΑΚΤΟΡΑΣ</th>
          <th style="padding:12px 16px;text-align:right;font-size:11px;color:#64748b;font-weight:600">XP ΕΒΔ.</th>
          <th style="padding:12px 16px;text-align:right;font-size:11px;color:#64748b;font-weight:600">ΣΥΝΟΛΟ</th>
          <th style="padding:12px 16px;text-align:right;font-size:11px;color:#64748b;font-weight:600">ΥΠΕΒΑΛΕ</th>
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="5" style="text-align:center;padding:40px;color:#94a3b8">Κανένα δεδομένο ακόμα</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}

const METRIC_KEYS=['cold_calls','social_media_leads','mail_leads','portal_leads','referrals','followup_calls','first_meetings','second_meetings','meetings_with_seller','meetings_with_buyer','meetings_with_tenant','exclusive_listings','simple_listings','sale_contracts','purchase_contracts','rental_contracts','photo_shoots','open_houses','matterport_scans','floor_plans','new_partners','referrals_given','trainings_attended','team_meetings','conferences'];

function bind() {
  document.getElementById('lf')?.addEventListener('submit', async e=>{
    e.preventDefault(); S.loading=true; S.error=null; render();
    try {
      const d=await req('POST','/auth/login',{email:document.getElementById('le').value,password:document.getElementById('lp').value});
      S.user=d.user; await nav('dashboard');
    } catch(err) { S.error=err.message; S.loading=false; render(); }
  });
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>nav(el.dataset.nav)));
  document.getElementById('logoutBtn')?.addEventListener('click', logout);
  document.getElementById('wf')?.addEventListener('submit', async e=>{
    e.preventDefault(); S.loading=true; S.error=null; S.success=false; render();
    try {
      const fd=new FormData(e.target), body={};
      METRIC_KEYS.forEach(k=>body[k]=parseInt(fd.get(k)||0));
      body.notes=fd.get('notes')||null;
      const res=await req('POST','/agents/weekly/submit',body);
      S.success=true; S.lastXP=res.xp_earned; S.loading=false;
      await loadDash(); render();
    } catch(err) { S.error=err.message; S.loading=false; render(); }
  });
}

(async()=>{ const ok=await checkAuth(); if(ok){await nav('dashboard');}else{render();} })();
</script>
</body>
</html>
